apply plugin: 'com.android.application'

android {
    namespace = "com.xray.multitest"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.xray.multitest"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode project.hasProperty('versionCode') ? project.property('versionCode').toInteger() : 1
        versionName project.hasProperty('versionName') ? project.property('versionName').toString() : "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             cruncherEnabled = false
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            def keystoreFile = file("release.keystore")
            if (keystoreFile.exists()) {
                storeFile keystoreFile
                storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
                keyAlias System.getenv("KEY_ALIAS") ?: ""
                keyPassword System.getenv("KEY_PASSWORD") ?: ""
            } else {
                def debugKeystoreFile = file("debug.keystore")
                // 1. Try decoding from debug.keystore.base64
                def debugB64File = file("../../debug.keystore.base64")
                if (debugB64File.exists() && !debugKeystoreFile.exists()) {
                    try {
                        def base64Content = debugB64File.text.trim()
                        def decodedBytes = java.util.Base64.getDecoder().decode(base64Content)
                        debugKeystoreFile.withOutputStream { it.write(decodedBytes) }
                        println("Successfully decoded fallback debug.keystore from base64")
                    } catch (Exception e) {
                        println("Failed to decode fallback debug.keystore: " + e.getMessage())
                    }
                }
                
                // 2. If it still doesn't exist, dynamically generate a fresh keystore
                if (!debugKeystoreFile.exists()) {
                    try {
                        println("No signing keystore found. Dynamically generating debug.keystore...")
                        def cmd = [
                            "keytool", "-genkey", "-v",
                            "-keystore", debugKeystoreFile.absolutePath,
                            "-alias", "androiddebugkey",
                            "-keyalg", "RSA",
                            "-keysize", "2048",
                            "-validity", "10000",
                            "-storepass", "android",
                            "-keypass", "android",
                            "-dname", "CN=Android Debug,O=Android,C=US"
                        ]
                        def process = cmd.execute()
                        process.waitFor()
                        if (process.exitValue() != 0) {
                            println("Error generating dynamic keystore: " + process.err.text)
                        } else {
                            println("Successfully generated dynamic fallback debug.keystore!")
                        }
                    } catch (Exception e) {
                        println("Failed to execute keytool: " + e.getMessage())
                    }
                }

                if (debugKeystoreFile.exists()) {
                    storeFile debugKeystoreFile
                    storePassword "android"
                    keyAlias "androiddebugkey"
                    keyPassword "android"
                } else {
                    println("WARNING: debug.keystore could not be resolved or generated!")
                }
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            crunchPngs false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    applicationVariants.all { variant ->
        variant.outputs.all {
            def appName = "XrayMultiTest"
            def versionNameStr = variant.versionName
            outputFileName = "${appName}-v${versionNameStr}-${variant.buildType.name}.apk"
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
